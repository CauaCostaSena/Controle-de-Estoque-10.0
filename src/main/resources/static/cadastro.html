<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>StockControl – Registrar Operador</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <style>
    :root {
      --bg: #09090b; 
      --surface: #121214; 
      --border: #27272a;
      --accent: #2563eb; 
      --accent-h: #3b82f6; 
      --text: #f4f4f5; 
      --muted: #a1a1aa;
      --error: #ef4444; 
      --success: #10b981; 
      --radius: 8px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
    
    body { 
      background: var(--bg); 
      color: var(--text); 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      min-height: 100vh; 
    }
    
    .login-container { 
      background: var(--surface); 
      border: 1px solid var(--border); 
      padding: 32px; 
      border-radius: var(--radius); 
      width: 100%; 
      max-width: 400px; 
    }
    
    .header-panel { text-align: center; margin-bottom: 24px; }
    .header-panel h2 { font-size: 20px; font-weight: 600; }
    .header-panel p { color: var(--muted); font-size: 13px; margin-top: 4px; }
    
    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; }
    
    .form-control { 
      width: 100%; 
      background: var(--bg); 
      border: 1px solid var(--border); 
      border-radius: var(--radius); 
      padding: 10px 12px; 
      color: var(--text); 
      font-size: 14px; 
    }
    .form-control:focus { outline: none; border-color: var(--accent); }
    
    .btn-action { 
      width: 100%; 
      background: var(--accent); 
      color: #fff; 
      border: none; 
      padding: 12px; 
      border-radius: var(--radius); 
      font-size: 14px; 
      font-weight: 500; 
      cursor: pointer; 
      transition: background 0.2s; 
    }
    .btn-action:hover { background: var(--accent-h); }
    .btn-action:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; }
    
    .msg { padding: 10px; border-radius: var(--radius); font-size: 13px; margin-bottom: 16px; display: none; align-items: center; gap: 8px; }
    .msg.error { background: rgba(239, 68, 68, 0.1); border: 1px solid var(--error); color: #fca5a5; }
    .msg.success { background: rgba(16, 185, 129, 0.1); border: 1px solid var(--success); color: #a7f3d0; }
    
    .back-link { text-align: center; margin-top: 20px; font-size: 13px; }
    .back-link a { color: var(--muted); text-decoration: none; }
    .back-link a:hover { color: var(--text); text-underline-offset: 3px; text-decoration: underline; }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="header-panel">
      <h2>Criar Conta de Operador</h2>
      <p>O login criado será estritamente sensível a maiúsculas e acentos.</p>
    </div>

    <div id="msg-status" class="msg"></div>

    <form id="formCadastro" onsubmit="registrarOperador(event)">
      <div class="form-group">
        <label for="login">Login de Usuário</label>
        <input type="text" id="login" class="form-control" placeholder="Ex: admin, matue, Matuê" required maxlength="50"/>
      </div>

      <div class="form-group">
        <label for="senha">Senha</label>
        <input type="password" id="senha" class="form-control" placeholder="Mínimo 6 caracteres" required/>
      </div>

      <div class="form-group">
        <label for="confirmSenha">Confirmar Senha</label>
        <input type="password" id="confirmSenha" class="form-control" placeholder="Repita a senha exatamente" required/>
      </div>

      <button type="submit" id="btnRegistrar" class="btn-action">Registrar no Estoque</button>
    </form>

    <div class="back-link">
      <a href="index.html"><i class="ph ph-arrow-left"></i> Voltar para o Login</a>
    </div>
  </div>

  <script>
    async function registrarOperador(event) {
      event.preventDefault();
      const login = document.getElementById('login').value;
      const senha = document.getElementById('senha').value;
      const confirmSenha = document.getElementById('confirmSenha').value;
      const msg = document.getElementById('msg-status');
      const btn = document.getElementById('btnRegistrar');

      msg.style.display = 'none';

      if (senha.length < 6) {
        msg.className = 'msg error';
        msg.innerHTML = '<i class="ph ph-warning-circle"></i> A senha deve ter no mínimo 6 caracteres.';
        msg.style.display = 'flex';
        return;
      }

      if (senha !== confirmSenha) {
        msg.className = 'msg error';
        msg.innerHTML = '<i class="ph ph-warning-circle"></i> As senhas informadas não coincidem.';
        msg.style.display = 'flex';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Processando registro...';

      try {
        const res = await fetch('/auth/cadastro', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ login, senha })
        });

        if (res.ok) {
          msg.className = 'msg success';
          msg.innerHTML = '<i class="ph ph-check-circle"></i> Operador registrado com sucesso! Redirecionando...';
          msg.style.display = 'flex';
          setTimeout(() => window.location.href = 'index.html', 1500);
        } else {
          btn.disabled = false;
          btn.textContent = 'Registrar no Estoque';
          msg.className = 'msg error';
          msg.innerHTML = '<i class="ph ph-x-circle"></i> Erro: Este login já está sendo utilizado.';
          msg.style.display = 'flex';
        }
      } catch (e) {
        btn.disabled = false;
        btn.textContent = 'Registrar no Estoque';
        msg.className = 'msg error';
        msg.innerHTML = '<i class="ph ph-warning-circle"></i> Falha de comunicação com o servidor.';
        msg.style.display = 'flex';
      }
    }
  </script>
</body>
</html>
