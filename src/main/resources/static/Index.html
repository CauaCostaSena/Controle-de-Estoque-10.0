<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>StockControl – Acesso</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <style>
    :root {
      --bg-dark: #0f172a; 
      --surface: rgba(30, 41, 59, 0.7); 
      --border: rgba(255, 255, 255, 0.1); 
      --text: #f8fafc; 
      --muted: #94a3b8;
      --primary: #6366f1; 
      --primary-hover: #4f46e5; 
      --danger: #ef4444; 
      --success: #10b981;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
    
    body { 
      background: linear-gradient(135deg, #090d16 0%, #0f172a 100%);
      color: var(--text); 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      height: 100vh; 
      overflow: hidden;
    }

    .login-container {
      background: var(--surface);
      border: 1px solid var(--border);
      backdrop-filter: blur(12px);
      padding: 40px;
      border-radius: 16px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
    }

    .logo-section {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo-section i {
      font-size: 48px;
      color: var(--primary);
      margin-bottom: 12px;
    }

    .logo-section h2 {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .logo-section p {
      color: var(--muted);
      font-size: 14px;
      margin-top: 4px;
    }

    .form-group {
      margin-bottom: 20px;
      position: relative;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .input-wrapper {
      position: relative;
    }

    .input-wrapper i {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 20px;
    }

    .form-control {
      width: 100%;
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px 12px 44px;
      color: var(--text);
      font-size: 15px;
      transition: all 0.2s ease;
    }

    .form-control:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
    }

    .btn-submit {
      width: 100%;
      background: var(--primary);
      color: #fff;
      border: none;
      padding: 14px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s ease;
      margin-top: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-submit:hover {
      background: var(--primary-hover);
    }

    .msg {
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid var(--danger);
      color: #fca5a5;
      padding: 12px;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 20px;
      display: none;
      align-items: center;
      gap: 8px;
    }

    .register-link {
      text-align: center;
      margin-top: 24px;
      font-size: 14px;
      color: var(--muted);
    }

    .register-link a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 500;
    }

    .register-link a:hover {
      text-decoration: underline;
    }

    /* LOADER COMPONENT */
    .loader-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(9, 13, 22, 0.85);
      backdrop-filter: blur(8px);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 9999; opacity: 0; pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .loader-overlay.active { opacity: 1; pointer-events: auto; }
    .loader-spinner { font-size: 48px; color: var(--primary); animation: spin 1s linear infinite; }
    .loader-text { margin-top: 16px; font-size: 16px; font-weight: 500; color: var(--text); }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="logo-section">
      <i class="ph ph-package"></i>
      <h2>StockControl</h2>
      <p>Gerenciamento de Estoque Blindado</p>
    </div>

    <div id="msg-erro" class="msg"></div>

    <form id="formLogin" onsubmit="efetuarLogin(event)">
      <div class="form-group">
        <label for="login">Usuário</label>
        <div class="input-wrapper">
          <i class="ph ph-user"></i>
          <input type="text" id="login" class="form-control" placeholder="Digite seu usuário" required maxlength="50" autocomplete="username"/>
        </div>
      </div>

      <div class="form-group">
        <label for="senha">Senha</label>
        <div class="input-wrapper">
          <i class="ph ph-lock"></i>
          <input type="password" id="senha" class="form-control" placeholder="Digite sua senha" required autocomplete="current-password"/>
        </div>
      </div>

      <button type="submit" class="btn-submit">
        Acessar Sistema <i class="ph ph-arrow-right"></i>
      </button>
    </form>

    <div class="register-link">
      Novo operador? <a href="cadastro.html">Cadastrar Conta</a>
    </div>
  </div>

  <!-- Loader Global -->
  <div id="loader" class="loader-overlay">
    <i class="ph ph-spinner loader-spinner"></i>
    <div id="loader-text" class="loader-text">Autenticando...</div>
  </div>

  <script>
    async function efetuarLogin(event) {
      event.preventDefault();
      const loginInput = document.getElementById('login').value; // Mantém case exato para collation binary
      const senhaInput = document.getElementById('senha').value;
      const msg = document.getElementById('msg-erro');

      msg.style.display = 'none';
      mostrarLoader("Validando credenciais...");

      try {
        const res = await fetch('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ login: loginInput, senha: senhaInput })
        });

        if (res.ok) {
          const usuarioLogado = await res.json();
          // Salva dados essenciais da sessão
          sessionStorage.setItem('usuarioId', usuarioLogado.id);
          sessionStorage.setItem('usuarioLogin', usuarioLogado.login);

          document.getElementById('loader-text').textContent = "Acesso autorizado! Carregando painel...";
          const spinner = document.querySelector('.loader-spinner');
          spinner.classList.replace('ph-spinner', 'ph-check-circle');
          spinner.style.color = 'var(--success)';
          spinner.style.animation = 'none';

          setTimeout(() => {
            window.location.href = 'dashboard.html';
          }, 1000);
        } else {
          esconderLoader();
          msg.innerHTML = '<i class="ph ph-warning-circle"></i> Usuário ou senha incorretos (Sensível a maiúsculas/acentos).';
          msg.style.display = 'flex';
        }
      } catch (error) {
        esconderLoader();
        msg.innerHTML = '<i class="ph ph-warning-circle"></i> Erro ao conectar com o servidor.';
        msg.style.display = 'flex';
      }
    }

    function mostrarLoader(texto) {
      document.getElementById('loader-text').textContent = texto;
      document.getElementById('loader').classList.add('active');
    }

    function esconderLoader() {
      document.getElementById('loader').classList.remove('active');
    }
  </script>
</body>
</html>
