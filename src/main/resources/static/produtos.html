<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>StockControl – Produtos</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <style>
    :root {
      --bg: #0f172a; --surface: #1e293b; --surface-hover: #334155;
      --border: #334155; --text: #f8fafc; --muted: #94a3b8;
      --primary: #6366f1; --primary-hover: #4f46e5; --danger: #ef4444; 
      --success: #10b981; --warning: #f59e0b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
    body { background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }
    
    /* SIDEBAR */
    .sidebar { width: 260px; min-width: 260px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; justify-content: space-between; padding: 24px; }
    .brand { display: flex; align-items: center; gap: 12px; font-size: 20px; font-weight: 700; color: #fff; margin-bottom: 32px; }
    .brand i { color: var(--primary); font-size: 28px; }
    .menu { list-style: none; display: flex; flex-direction: column; gap: 8px; flex-grow: 1; }
    .menu a { display: flex; align-items: center; gap: 12px; padding: 12px; color: var(--muted); text-decoration: none; border-radius: 8px; font-weight: 500; transition: all 0.2s; }
    .menu a:hover, .menu a.active { background: var(--surface-hover); color: #fff; }
    .menu a.active { border-left: 4px solid var(--primary); border-radius: 0 8px 8px 0; padding-left: 8px; }
    .user-info { display: flex; align-items: center; justify-content: space-between; padding-top: 16px; border-top: 1px solid var(--border); color: var(--muted); font-size: 14px; }
    .btn-logout { background: none; border: none; color: var(--danger); cursor: pointer; font-size: 18px; }

    /* CONTENT layout */
    .main-content { flex-grow: 1; padding: 40px; overflow-y: auto; display: flex; flex-direction: column; gap: 24px; }
    .header { display: flex; justify-content: space-between; align-items: center; }
    .header h1 { font-size: 26px; font-weight: 700; }
    
    .btn-primary { background: var(--primary); color: #fff; border: none; padding: 10px 18px; border-radius: 8px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: background 0.2s; }
    .btn-primary:hover { background: var(--primary-hover); }

    /* TABLE DESIGN */
    .table-wrapper { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
    table { width: 100%; border-collapse: collapse; text-align: left; font-size: 14px; }
    th { background: rgba(15, 23, 42, 0.4); padding: 16px; color: var(--muted); font-weight: 600; border-bottom: 1px solid var(--border); }
    td { padding: 16px; border-bottom: 1px solid var(--border); color: #e2e8f0; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255, 255, 255, 0.02); }
    
    .actions { display: flex; gap: 8px; }
    .btn-icon { background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: var(--text); padding: 6px; border-radius: 6px; cursor: pointer; transition: all 0.2s; }
    .btn-icon:hover { background: var(--surface-hover); color: var(--primary); }
    .btn-icon.delete:hover { color: var(--danger); }
    .btn-icon.movement:hover { color: var(--success); }

    /* NOTIFICATION TOAST */
    .toast { position: fixed; bottom: 24px; right: 24px; padding: 14px 20px; border-radius: 8px; background: var(--surface); border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 10000; display: none; align-items: center; gap: 10px; font-size: 14px; }
    .toast.success { border-color: var(--success); color: #a7f3d0; }
    .toast.error { border-color: var(--danger); color: #fca5a5; }

    /* MODAL DESIGN */
    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(9, 13, 22, 0.7); backdrop-filter: blur(4px); z-index: 999; display: none; align-items: center; justify-content: center; }
    .modal-overlay.active { display: flex; }
    .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; width: 100%; max-width: 460px; padding: 28px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
    .modal h2 { font-size: 18px; margin-bottom: 20px; color: #fff; }
    
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; }
    .form-control { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; color: #fff; font-size: 14px; }
    .form-control:focus { outline: none; border-color: var(--primary); }
    
    .modal-footer { display: flex; justify-content: flex-end; gap: 12px; margin-top: 24px; }
    .btn-cancel { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 10px 16px; border-radius: 8px; cursor: pointer; }
    .btn-cancel:hover { color: #fff; background: rgba(255,255,255,0.05); }
  </style>
</head>
<body>

  <aside class="sidebar">
    <div>
      <div class="brand"><i class="ph ph-package"></i> <span>StockControl</span></div>
      <ul class="menu">
        <li><a href="dashboard.html"><i class="ph ph-squares-four"></i> Visão Geral</a></li>
        <li><a href="produtos.html" class="active"><i class="ph ph-cube"></i> Produtos</a></li>
        <li><a href="categorias.html"><i class="ph ph-folders"></i> Categorias</a></li>
        <li><a href="movimentacoes.html"><i class="ph ph-arrows-left-right"></i> Movimentações</a></li>
      </ul>
    </div>
    <div class="user-info">
      <div><i class="ph ph-user-circle"></i> <span id="sessao-usuario">@operador</span></div>
      <button class="btn-logout" onclick="sessionStorage.clear(); window.location.href='index.html';"><i class="ph ph-sign-out"></i></button>
    </div>
  </aside>

  <main class="main-content">
    <div class="header">
      <h1>Gerenciamento de Produtos</h1>
      <button class="btn-primary" onclick="abrirModalCadastro()"><i class="ph ph-plus"></i> Novo Produto</button>
    </div>

    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th width="8%">ID</th>
            <th width="32%">Nome do Produto</th>
            <th width="15%">Estoque</th>
            <th width="15%">Preço Unitário</th>
            <th width="15%">Categoria</th>
            <th width="15%">Ações</th>
          </tr>
        </thead>
        <tbody id="tabela-produtos">
          </tbody>
      </table>
    </div>
  </main>

  <div class="modal-overlay" id="modalProduto">
    <div class="modal">
      <h2 id="modalTitle">Cadastrar Novo Produto</h2>
      <form id="formProduto" onsubmit="salvarProduto(event)">
        <input type="hidden" id="prodId"/>
        
        <div class="form-group">
          <label for="prodNome">Nome do Produto</label>
          <input type="text" id="prodNome" class="form-control" required maxlength="100"/>
        </div>
        
        <div class="form-group">
          <label for="prodQtd">Estoque Inicial</label>
          <input type="number" id="prodQtd" class="form-control" min="0" required value="0"/>
        </div>
        
        <div class="form-group">
          <label for="prodPreco">Preço Unitário (R$)</label>
          <input type="number" id="prodPreco" class="form-control" step="0.01" min="0" required value="0.00"/>
        </div>
        
        <div class="form-group">
          <label for="prodCategoria">Categoria Vinculada</label>
          <select id="prodCategoria" class="form-control" required>
            </select>
        </div>

        <div class="modal-footer">
          <button type="button" class="btn-cancel" onclick="fecharModal()">Cancelar</button>
          <button type="submit" class="btn-primary">Salvar Produto</button>
        </div>
      </form>
    </div>
  </div>

  <div class="modal-overlay" id="modalMovimentacao">
    <div class="modal">
      <h2>Lançar Movimentação de Estoque</h2>
      <form id="formMov" onsubmit="lancarMovimentacao(event)">
        <input type="hidden" id="movProdId"/>
        <div class="form-group">
          <label>Produto Selecionado</label>
          <input type="text" id="movProdNome" class="form-control" readonly style="opacity: 0.6;"/>
        </div>
        <div class="form-group">
          <label for="movTipo">Tipo de Operação</label>
          <select id="movTipo" class="form-control" required>
            <option value="ENTRADA">ENTRADA (Aumento de Estoque)</option>
            <option value="SAIDA">SAÍDA (Baixa de Estoque)</option>
          </select>
        </div>
        <div class="form-group">
          <label for="movQtd">Quantidade</label>
          <input type="number" id="movQtd" class="form-control" min="1" required value="1"/>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn-cancel" onclick="fecharModalMov()">Cancelar</button>
          <button type="submit" class="btn-primary" style="background:var(--success)">Confirmar Operação</button>
        </div>
      </form>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    const operId = sessionStorage.getItem('usuarioId');
    if(!operId) window.location.href = 'index.html';
    document.getElementById('sessao-usuario').textContent = `@${sessionStorage.getItem('usuarioLogin')}`;

    async function carregarProdutos() {
      try {
        const res = await fetch('/produtos');
        const produtos = await res.json();
        const tabela = document.getElementById('tabela-produtos');
        tabela.innerHTML = '';

        if(produtos.length === 0) {
          tabela.innerHTML = '<tr><td colspan="6" style="text-align:center; color:var(--muted);">Nenhum produto cadastrado no banco estoque_db.</td></tr>';
          return;
        }

        produtos.forEach(p => {
          const nomeCat = p.categoria ? (p.categoria.nome || p.categoria) : 'Sem categoria';
          tabela.innerHTML += `
            <tr>
              <td>#${p.id}</td>
              <td style="font-weight:600; color:#fff;">${p.nome}</td>
              <td>${p.quantidade} un</td>
              <td>R$ ${p.preco.toFixed(2)}</td>
              <td><span style="color:var(--muted);">${nomeCat}</span></td>
              <td>
                <div class="actions">
                  <button class="btn-icon" onclick="abrirModalMov(${p.id}, '${p.nome.replace(/'/g, "\\'")}')" title="Movimentar Estoque"><i class="ph ph-arrows-left-right"></i></button>
                  <button class="btn-icon" onclick="prepararEdicao(${p.id}, '${p.nome.replace(/'/g, "\\'")}', ${p.quantidade}, ${p.preco}, ${p.categoria?.id || p.id_categoria})" title="Editar"><i class="ph ph-pencil-simple"></i></button>
                  <button class="btn-icon delete" onclick="excluirProduto(${p.id})" title="Excluir"><i class="ph ph-trash"></i></button>
                </div>
              </td>
            </tr>
          `;
        });
      } catch (e) {
        mostrarToast('Erro ao listar produtos do servidor.', 'error');
      }
    }

    async function carregarCategoriasDropdown() {
      try {
        const res = await fetch('/categorias');
        const categorias = await res.json();
        const select = document.getElementById('prodCategoria');
        select.innerHTML = '<option value="">-- Selecione uma Categoria --</option>';
        categorias.forEach(c => {
          select.innerHTML += `<option value="${c.id}">${c.nome}</option>`;
        });
      } catch (e) { console.error('Erro categorias dropdown', e); }
    }

    function abrirModalCadastro() {
      document.getElementById('formProduto').reset();
      document.getElementById('prodId').value = '';
      document.getElementById('prodQtd').disabled = false; // permite estoque inicial apenas no cadastro
      document.getElementById('modalTitle').textContent = 'Cadastrar Novo Produto';
      document.getElementById('modalProduto').classList.add('active');
    }

    function prepararEdicao(id, nome, qtd, preco, catId) {
      document.getElementById('prodId').value = id;
      document.getElementById('prodNome').value = nome;
      document.getElementById('prodQtd').value = qtd;
      document.getElementById('prodQtd').disabled = true; // alterações de estoque apenas por movimentações (regra de auditoria)
      document.getElementById('prodPreco').value = preco;
      document.getElementById('prodCategoria').value = catId || '';
      document.getElementById('modalTitle').textContent = `Editar Produto #${id}`;
      document.getElementById('modalProduto').classList.add('active');
    }

    function fecharModal() { document.getElementById('modalProduto').classList.remove('active'); }

    async function salvarProduto(event) {
      event.preventDefault();
      const id = document.getElementById('prodId').value;
      const nome = document.getElementById('prodNome').value;
      const quantidade = document.getElementById('prodQtd').value;
      const preco = document.getElementById('prodPreco').value;
      const idCategoria = document.getElementById('prodCategoria').value;

      const payload = {
        nome,
        quantidade: parseInt(quantidade),
        preco: parseFloat(preco),
        // Envia objeto ou id conforme o seu backend Spring preferir (suporta ambos)
        id_categoria: parseInt(idCategoria),
        id_usuario: parseInt(operId),
        categoria: { id: parseInt(idCategoria) },
        usuario: { id: parseInt(operId) }
      };

      const url = id ? `/produtos/${id}` : '/produtos';
      const method = id ? 'PUT' : 'POST';

      try {
        const res = await fetch(url, {
          method: method,
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        if(res.ok) {
          mostrarToast(id ? 'Produto atualizado!' : 'Produto cadastrado com sucesso!', 'success');
          fecharModal();
          carregarProdutos();
        } else {
          mostrarToast('Falha ao salvar produto. Verifique os dados.', 'error');
        }
      } catch (e) { mostrarToast('Erro na conexão com o servidor.', 'error'); }
    }

    async function excluirProduto(id) {
      if(!confirm('Atenção: Ao excluir o produto, o histórico de movimentações dele será preservado com ID nulo (SET NULL). Deseja continuar?')) return;
      try {
        const res = await fetch(`/produtos/${id}`, { method: 'DELETE' });
        if(res.ok) {
          mostrarToast('Produto excluído! Histórico de auditoria preservado.', 'success');
          carregarProdutos();
        } else {
          const txt = await res.text();
          mostrarToast('Erro: ' + txt, 'error');
        }
      } catch (e) { mostrarToast('Erro ao processar exclusão.', 'error'); }
    }

    // Controle de Movimentação Rápida
    function abrirModalMov(id, nome) {
      document.getElementById('formMov').reset();
      document.getElementById('movProdId').value = id;
      document.getElementById('movProdNome').value = nome;
      document.getElementById('modalMovimentacao').classList.add('active');
    }
    function fecharModalMov() { document.getElementById('modalMovimentacao').classList.remove('active'); }

    async function lancarMovimentacao(event) {
      event.preventDefault();
      const idProduto = document.getElementById('movProdId').value;
      const tipo = document.getElementById('movTipo').value;
      const quantidade = document.getElementById('movQtd').value;

      const payload = {
        quantidade: parseInt(quantidade),
        tipo,
        id_produto: parseInt(idProduto),
        id_usuario: parseInt(operId),
        produto: { id: parseInt(idProduto) },
        usuario: { id: parseInt(operId) }
      };

      try {
        const res = await fetch('/movimentacoes', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        if(res.ok) {
          mostrarToast('Movimentação registrada e estoque atualizado!', 'success');
          fecharModalMov();
          carregarProdutos();
        } else {
          const txt = await res.text();
          mostrarToast('Erro: ' + txt, 'error');
        }
      } catch (e) { mostrarToast('Erro ao registrar movimentação.', 'error'); }
    }

    function mostrarToast(txt, type) {
      const el = document.getElementById('toast');
      el.textContent = txt;
      el.className = `toast ${type}`;
      el.style.display = 'flex';
      setTimeout(() => { el.style.display = 'none'; }, 3000);
    }

    window.onload = () => {
      carregarProdutos();
      carregarCategoriasDropdown();
    };
  </script>
</body>
</html>
