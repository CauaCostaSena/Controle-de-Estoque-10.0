<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>StockControl – Produtos</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <style>
    :root {
      --bg: #0f172a; --surface: #1e293b; --surface-hover: #334155;
      --border: #334155; --text: #f8fafc; --muted: #94a3b8;
      --primary: #6366f1; --primary-hover: #4f46e5; --danger: #ef4444; 
      --success: #10b981; --warning: #f59e0b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
    body { background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }
    
    /* BARRA LATERAL */
    .sidebar { width: 260px; min-width: 260px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 24px; height: 100vh; }
    .sidebar .logo { font-size: 20px; font-weight: bold; margin-bottom: 40px; display: flex; align-items: center; gap: 10px; }
    .sidebar .logo i { color: var(--primary); font-size: 28px; }
    .menu { list-style: none; display: flex; flex-direction: column; gap: 8px; flex: 1; }
    .menu a { text-decoration: none; color: var(--muted); padding: 12px 16px; border-radius: 8px; display: flex; align-items: center; gap: 12px; font-weight: 500; transition: all 0.2s ease; }
    .menu a:hover { background: var(--surface-hover); color: var(--text); padding-left: 20px; }
    .menu a.active { background: var(--surface-hover); color: var(--text); border-left: 4px solid var(--primary); border-radius: 0 8px 8px 0; }
    
    /* CONTEÚDO PRINCIPAL */
    .main-content { flex: 1; padding: 32px 40px; overflow-y: auto; animation: fadeIn 0.4s ease; position: relative; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; }
    .header h1 { font-size: 24px; font-weight: 600; }
    
    .btn-primary { background: var(--primary); color: #fff; border: none; padding: 12px 20px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 8px; }
    .btn-primary:hover { background: var(--primary-hover); transform: translateY(-2px); }

    /* TABELA DE PRODUTOS */
    .table-wrapper { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
    table { width: 100%; border-collapse: collapse; text-align: left; }
    th { background: var(--surface-hover); padding: 16px; font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; }
    td { padding: 16px; border-bottom: 1px solid var(--border); font-size: 14px; vertical-align: middle; }
    tr { transition: background 0.2s; }
    tr:hover { background: var(--surface-hover); }

    .action-btn { background: transparent; border: none; cursor: pointer; font-size: 18px; color: var(--muted); transition: color 0.2s; padding: 4px; }
    .action-btn.edit:hover { color: var(--primary); }
    .action-btn.delete:hover { color: var(--danger); }

    .badge { padding: 4px 8px; border-radius: 6px; font-size: 12px; font-weight: 600; }
    .badge.ok { background: rgba(16, 185, 129, 0.1); color: var(--success); }
    .badge.low { background: rgba(239, 68, 68, 0.1); color: var(--danger); }

    /* MODAL DE CADASTRO/EDIÇÃO */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
    .modal-overlay.active { opacity: 1; pointer-events: auto; }
    .modal-box { background: var(--surface); padding: 32px; border-radius: 12px; width: 100%; max-width: 400px; border: 1px solid var(--border); transform: scale(0.95); transition: transform 0.3s; }
    .modal-overlay.active .modal-box { transform: scale(1); }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .modal-header h2 { font-size: 18px; }
    .modal-header button { background: none; border: none; color: var(--muted); font-size: 24px; cursor: pointer; }
    .modal-header button:hover { color: var(--text); }
    
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 8px; }
    .form-group input { width: 100%; background: rgba(0,0,0,0.2); border: 1px solid var(--border); color: var(--text); padding: 12px 16px; border-radius: 8px; outline: none; }
    .form-group input:focus { border-color: var(--primary); }
    .modal-footer { display: flex; gap: 12px; margin-top: 24px; }
    .btn-secondary { background: transparent; border: 1px solid var(--border); color: var(--text); padding: 12px; border-radius: 8px; flex: 1; cursor: pointer; transition: 0.2s; }
    .btn-secondary:hover { background: var(--surface-hover); }
    .btn-submit { background: var(--primary); border: none; color: white; padding: 12px; border-radius: 8px; flex: 1; cursor: pointer; transition: 0.2s; font-weight: 600; }
    .btn-submit:hover { background: var(--primary-hover); }

    /* SISTEMA DE NOTIFICAÇÕES (TOASTS) VISUALMENTE BONITOS */
    .toast-container { position: fixed; bottom: 24px; right: 24px; display: flex; flex-direction: column; gap: 12px; z-index: 9999; }
    .toast { display: flex; align-items: center; gap: 12px; padding: 16px 20px; border-radius: 8px; font-size: 14px; font-weight: 500; color: #fff; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); animation: slideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; min-width: 250px; }
    .toast.success { background: var(--surface); border-left: 4px solid var(--success); }
    .toast.success i { color: var(--success); font-size: 20px; }
    .toast.error { background: var(--surface); border-left: 4px solid var(--danger); }
    .toast.error i { color: var(--danger); font-size: 20px; }
    .toast.fade-out { animation: fadeOut 0.4s forwards; }

    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes fadeOut { from { transform: translateX(0); opacity: 1; } to { transform: translateX(100%); opacity: 0; } }
  </style>
</head>
<body>

  <aside class="sidebar">
    <div class="logo"><i class="ph-fill ph-package"></i> StockControl</div>
    <ul class="menu">
      <li><a href="dashboard.html"><i class="ph ph-squares-four"></i> Visão Geral</a></li>
      <li><a href="produtos.html" class="active"><i class="ph ph-cube"></i> Produtos</a></li>
      <li><a href="categorias.html"><i class="ph ph-folders"></i> Categorias</a></li>
      <li><a href="movimentacoes.html"><i class="ph ph-arrows-left-right"></i> Movimentações</a></li>
    </ul>
    <div style="margin-top: auto;">
      <a href="index.html" style="color: var(--danger); text-decoration: none; display: flex; align-items: center; gap: 12px; padding: 12px;"><i class="ph ph-sign-out"></i> Sair do sistema</a>
    </div>
  </aside>

  <main class="main-content">
    <div class="header">
      <h1>Gerenciar Produtos</h1>
      <button class="btn-primary" onclick="abrirModal()"><i class="ph ph-plus"></i> Novo Produto</button>
    </div>

    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Nome do Produto</th>
            <th>Categoria</th>
            <th>Quantidade</th>
            <th>Preço (R$)</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody id="tabela-corpo">
          </tbody>
      </table>
    </div>
  </main>

  <div class="modal-overlay" id="produtoModal">
    <div class="modal-box">
      <div class="modal-header">
        <h2 id="modalTitle">Cadastrar Produto</h2>
        <button onclick="fecharModal()"><i class="ph ph-x"></i></button>
      </div>
      <form id="formProduto" onsubmit="salvarProduto(event)">
        <input type="hidden" id="prodId" />
        
        <div class="form-group">
          <label>Nome do Produto</label>
          <input type="text" id="prodNome" required placeholder="Ex: Teclado Mecânico"/>
        </div>
        <div class="form-group">
          <label>Quantidade em Estoque</label>
          <input type="number" id="prodQtd" required min="0" placeholder="Ex: 15"/>
        </div>
        <div class="form-group">
          <label>Preço Unitário (R$)</label>
          <input type="number" id="prodPreco" required step="0.01" min="0" placeholder="Ex: 120.50"/>
        </div>
        
        <div class="modal-footer">
          <button type="button" class="btn-secondary" onclick="fecharModal()">Cancelar</button>
          <button type="submit" class="btn-submit">Salvar Dados</button>
        </div>
      </form>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script>
    // URL base do seu Backend Spring Boot
    const API_URL = 'http://localhost:8080/produtos';

    // 1. FUNÇÃO PARA CRIAR ALERTAS ELEGANTES NA TELA
    function mostrarNotificacao(mensagem, tipo = 'success') {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = `toast ${tipo}`;
      
      const icone = tipo === 'success' ? 'ph-check-circle' : 'ph-warning-circle';
      toast.innerHTML = `<i class="ph-fill ${icone}"></i> <span>${mensagem}</span>`;
      
      container.appendChild(toast);

      // Remove automaticamente após 3.5 segundos
      setTimeout(() => {
        toast.classList.add('fade-out');
        toast.addEventListener('animationend', () => toast.remove());
      }, 3500);
    }

    // 2. BUSCAR DADOS REAIS DO BANCO DE DADOS
    async function carregarProdutos() {
      const tbody = document.getElementById('tabela-corpo');
      tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;"><i class="ph ph-spinner ph-spin"></i> Carregando do banco de dados...</td></tr>';

      try {
        const response = await fetch(API_URL);
        if (!response.ok) throw new Error('Falha ao conectar no backend');
        
        const produtos = await response.json();
        renderizarTabela(produtos);
      } catch (error) {
        tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; color: var(--danger);">Erro ao carregar produtos. Verifique se o backend está rodando.</td></tr>';
        mostrarNotificacao('Erro de conexão com o banco', 'error');
      }
    }

    // 3. RENDERIZAR TABELA COM DADOS DO BANCO
    function renderizarTabela(produtos) {
      const tbody = document.getElementById('tabela-corpo');
      tbody.innerHTML = '';

      if (produtos.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; color: var(--muted);">Nenhum produto cadastrado no banco.</td></tr>';
        return;
      }

      produtos.forEach(p => {
        const tr = document.createElement('tr');
        
        const badgeClass = p.quantidade > 5 ? 'badge ok' : 'badge low';
        const badgeText = p.quantidade > 5 ? 'Em Estoque' : 'Baixo';
        const nomeCategoria = p.categoria && p.categoria.nome ? p.categoria.nome : 'Geral';

        // Evita erros caso o preço venha nulo
        const precoFormatado = p.preco ? p.preco.toFixed(2) : '0.00';

        tr.innerHTML = `
          <td style="color: var(--muted);">#${p.id}</td>
          <td style="font-weight: 500;">${p.nome}</td>
          <td style="color: var(--muted); font-size: 13px;">${nomeCategoria}</td>
          <td><span class="${badgeClass}">${p.quantidade} (${badgeText})</span></td>
          <td>R$ ${precoFormatado}</td>
          <td>
            <button class="action-btn edit" onclick="prepararEdicao(${p.id}, '${p.nome}', ${p.quantidade}, ${p.preco})" title="Editar"><i class="ph ph-pencil-simple"></i></button>
            <button class="action-btn delete" onclick="excluirProduto(${p.id})" title="Excluir"><i class="ph ph-trash"></i></button>
          </td>
        `;
        tbody.appendChild(tr);
      });
    }

    // 4. LÓGICA DE SALVAR OU ATUALIZAR (POST ou PUT)
    async function salvarProduto(event) {
      event.preventDefault(); // Impede a página de recarregar
      
      const id = document.getElementById('prodId').value;
      const nome = document.getElementById('prodNome').value;
      const quantidade = parseInt(document.getElementById('prodQtd').value);
      const preco = parseFloat(document.getElementById('prodPreco').value);

      const dadosProduto = { nome, quantidade, preco };

      try {
        const metodo = id ? 'PUT' : 'POST';
        const url = id ? `${API_URL}/${id}` : API_URL;

        const response = await fetch(url, {
          method: metodo,
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(dadosProduto)
        });

        // IMPORTANTE: Seu controller Java retorna String pura ("Produto cadastrado!"), 
        // então não podemos usar response.json() aqui, senão quebra e não atualiza a tela!
        const mensagemRetorno = await response.text();

        if (response.ok) {
          mostrarNotificacao(mensagemRetorno, 'success');
          fecharModal();
          carregarProdutos(); // Atualiza a tabela com o banco real
        } else {
          mostrarNotificacao('Falha na operação: ' + mensagemRetorno, 'error');
        }
      } catch (error) {
        mostrarNotificacao('Erro fatal de conexão ao salvar', 'error');
      }
    }

    // 5. EXCLUSÃO DE PRODUTO REAL
    async function excluirProduto(id) {
      // Pequena confirmação nativa (pois exclusão de dados é crítica)
      if (!confirm("Tem certeza que deseja excluir permanentemente o produto #" + id + "?")) return;

      try {
        const response = await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
        const mensagemRetorno = await response.text();

        if (response.ok) {
          mostrarNotificacao(mensagemRetorno, 'success');
          carregarProdutos(); // Recarrega do banco
        } else {
          mostrarNotificacao('Erro: ' + mensagemRetorno, 'error');
        }
      } catch (error) {
        mostrarNotificacao('Erro de conexão ao excluir', 'error');
      }
    }

    // CONTROLE DE MODAL
    function abrirModal() {
      document.getElementById('formProduto').reset();
      document.getElementById('prodId').value = '';
      document.getElementById('modalTitle').textContent = 'Cadastrar Produto';
      document.getElementById('produtoModal').classList.add('active');
    }

    function fecharModal() {
      document.getElementById('produtoModal').classList.remove('active');
    }

    function prepararEdicao(id, nome, qtd, preco) {
      document.getElementById('prodId').value = id;
      document.getElementById('prodNome').value = nome;
      document.getElementById('prodQtd').value = qtd;
      document.getElementById('prodPreco').value = preco;
      
      document.getElementById('modalTitle').textContent = 'Editar Produto #' + id;
      document.getElementById('produtoModal').classList.add('active');
    }

    // Ao carregar a tela, busca os dados da API Java
    window.onload = carregarProdutos;
  </script>
</body>
</html>
