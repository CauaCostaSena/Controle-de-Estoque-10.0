<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>StockControl – Movimentações</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <style>
    :root {
      --bg: #0f172a; --surface: #1e293b; --surface-hover: #334155;
      --border: #334155; --text: #f8fafc; --muted: #94a3b8;
      --primary: #6366f1; --primary-hover: #4f46e5; --danger: #ef4444; 
      --success: #10b981; --warning: #f59e0b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
    body { background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }
    
    /* SIDEBAR */
    .sidebar { width: 260px; min-width: 260px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; justify-content: space-between; padding: 24px; }
    .brand { display: flex; align-items: center; gap: 12px; font-size: 20px; font-weight: 700; color: #fff; margin-bottom: 32px; }
    .brand i { color: var(--primary); font-size: 28px; }
    .menu { list-style: none; display: flex; flex-direction: column; gap: 8px; flex-grow: 1; }
    .menu a { display: flex; align-items: center; gap: 12px; padding: 12px; color: var(--muted); text-decoration: none; border-radius: 8px; font-weight: 500; transition: all 0.2s; }
    .menu a:hover, .menu a.active { background: var(--surface-hover); color: #fff; }
    .menu a.active { border-left: 4px solid var(--primary); border-radius: 0 8px 8px 0; padding-left: 8px; }
    .user-info { display: flex; align-items: center; justify-content: space-between; padding-top: 16px; border-top: 1px solid var(--border); color: var(--muted); font-size: 14px; }
    .btn-logout { background: none; border: none; color: var(--danger); cursor: pointer; font-size: 18px; }

    .main-content { flex-grow: 1; padding: 40px; overflow-y: auto; display: flex; flex-direction: column; gap: 24px; }
    .header h1 { font-size: 26px; font-weight: 700; }
    
    /* FILTERS COMPONENT */
    .filters-row { background: var(--surface); border: 1px solid var(--border); padding: 16px; border-radius: 10px; display: flex; gap: 16px; align-items: center; }
    .search-input { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 8px 12px; color: #fff; font-size: 14px; flex-grow: 1; }
    .filter-select { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 8px 12px; color: #fff; font-size: 14px; width: 160px; }

    /* AUDIT TABLE */
    .table-wrapper { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
    table { width: 100%; border-collapse: collapse; text-align: left; font-size: 14px; }
    th { background: rgba(15, 23, 42, 0.4); padding: 16px; color: var(--muted); font-weight: 600; border-bottom: 1px solid var(--border); }
    td { padding: 16px; border-bottom: 1px solid var(--border); color: #e2e8f0; }
    
    .badge { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; }
    .badge.entrada { background: rgba(16, 185, 129, 0.15); color: #a7f3d0; border: 1px solid var(--success); }
    .badge.saida { background: rgba(239, 68, 68, 0.15); color: #fca5a5; border: 1px solid var(--danger); }
  </style>
</head>
<body>

  <aside class="sidebar">
    <div>
      <div class="brand"><i class="ph ph-package"></i> <span>StockControl</span></div>
      <ul class="menu">
        <li><a href="dashboard.html"><i class="ph ph-squares-four"></i> Visão Geral</a></li>
        <li><a href="produtos.html"><i class="ph ph-cube"></i> Produtos</a></li>
        <li><a href="categorias.html"><i class="ph ph-folders"></i> Categorias</a></li>
        <li><a href="movimentacoes.html" class="active"><i class="ph ph-arrows-left-right"></i> Movimentações</a></li>
      </ul>
    </div>
    <div class="user-info">
      <div><i class="ph ph-user-circle"></i> <span id="sessao-usuario">@operador</span></div>
      <button class="btn-logout" onclick="sessionStorage.clear(); window.location.href='index.html';"><i class="ph ph-sign-out"></i></button>
    </div>
  </aside>

  <main class="main-content">
    <div class="header">
      <h1>Histórico de Movimentações (Log de Auditoria)</h1>
    </div>

    <!-- Filtros de Busca -->
    <div class="filters-row">
      <input type="text" id="inputBusca" class="search-input" placeholder="Pesquisar por nome do produto..." oninput="filtrarTabela()"/>
      <select id="selectTipo" class="filter-select" onchange="filtrarTabela()">
        <option value="TODOS">Todos os tipos</option>
        <option value="ENTRADA">Entradas</option>
        <option value="SAIDA">Saídas</option>
      </select>
    </div>

    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th width="8%">ID Reg.</th>
            <th width="25%">Produto</th>
            <th width="12%">Tipo</th>
            <th width="10%">Qtd.</th>
            <th width="25%">Motivo / Justificativa</th>
            <th width="20%">Data/Hora & Operador</th>
          </tr>
        </thead>
        <tbody id="tabela-movs">
          <!-- Carregado dinamicamente -->
        </tbody>
      </table>
    </div>
  </main>

  <script>
    if(!sessionStorage.getItem('usuarioId')) window.location.href = 'index.html';
    document.getElementById('sessao-usuario').textContent = `@${sessionStorage.getItem('usuarioLogin')}`;

    let dadosLocais = [];

    async function carregarHistorico() {
      try {
        const res = await fetch('/movimentacoes');
        dadosLocais = await res.json();
        filtrarTabela();
      } catch (e) {
        document.getElementById('tabela-movs').innerHTML = '<tr><td colspan="6" style="text-align:center; color:var(--danger);">Falha ao carregar registros de auditoria.</td></tr>';
      }
    }

    function filtrarTabela() {
      const termo = document.getElementById('inputBusca').value.toLowerCase();
      const tipoSel = document.getElementById('selectTipo').value;
      const tbody = document.getElementById('tabela-movs');
      tbody.innerHTML = '';

      const filtrados = dadosLocais.filter(m => {
        // Blindagem contra produto nulo devido à regra SET NULL de exclusão
        const nomeProd = m.produto ? (m.produto.nome || m.produto).toLowerCase() : 'produto excluído';
        const tipoMov = (m.tipo || '').toUpperCase();

        const bateNome = nomeProd.includes(termo);
        const bateTipo = tipoSel === 'TODOS' || tipoMov === tipoSel;
        return bateNome && bateTipo;
      });

      if(filtrados.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; color:var(--muted);">Nenhum registro de movimentação encontrado.</td></tr>';
        return;
      }

      // Renderiza as movimentações (as mais recentes aparecem no topo)
      [...filtrados].reverse().forEach(m => {
        const isEntrada = (m.tipo || '').toUpperCase() === 'ENTRADA';
        const badgeClass = isEntrada ? 'badge entrada' : 'badge saida';
        
        // Exibição amigável para produtos excluídos da auditoria
        const nomeProdExibicao = m.produto ? (m.produto.nome || m.produto) : '⚠️ Produto Removido (Histórico Preservado)';
        const responsavel = m.usuario ? (m.usuario.login || m.usuario) : (m.usuario_login || 'Sistema');

        let dataStr = 'Recente';
        if (m.dataHora || m.data) {
          const d = new Date(m.dataHora || m.data);
          if (!isNaN(d)) dataStr = d.toLocaleDateString('pt-BR') + ' ' + d.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});
        }

        tbody.innerHTML += `
          <tr>
            <td>#${m.id}</td>
            <td style="font-weight:600; color:${m.produto ? '#fff' : 'var(--muted)'};">${nomeProdExibicao}</td>
            <td><span class="${badgeClass}">${m.tipo}</span></td>
            <td style="font-weight:600; color:${isEntrada ? 'var(--success)' : 'var(--warning)'};">${isEntrada ? '+' : '-'}${m.quantidade}</td>
            <td><span style="font-size:13px; color:#cbd5e1;">${m.motivo || 'Sem justificativa'}</span></td>
            <td>
              <div style="font-size:13px; color:#fff;">${dataStr}</div>
              <div style="font-size:11px; color:var(--muted);">por @${responsavel}</div>
            </td>
          </tr>
        `;
      });
    }

    window.onload = carregarHistorico;
  </script>
</body>
</html>
