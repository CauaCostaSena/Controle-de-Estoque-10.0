<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>StockControl – Movimentações</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <style>
    :root {
      --bg: #0f172a; --surface: #1e293b; --surface-hover: #334155;
      --border: #334155; --text: #f8fafc; --muted: #94a3b8;
      --primary: #6366f1; --primary-hover: #4f46e5; --danger: #ef4444; 
      --success: #10b981; --warning: #f59e0b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
    body { background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }
    
    /* BARRA LATERAL */
    .sidebar { width: 260px; min-width: 260px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 24px; height: 100vh; }
    .sidebar .logo { font-size: 20px; font-weight: bold; margin-bottom: 40px; display: flex; align-items: center; gap: 10px; }
    .sidebar .logo i { color: var(--primary); font-size: 28px; }
    .menu { list-style: none; display: flex; flex-direction: column; gap: 8px; flex: 1; }
    .menu a { text-decoration: none; color: var(--muted); padding: 12px 16px; border-radius: 8px; display: flex; align-items: center; gap: 12px; font-weight: 500; transition: all 0.2s ease; }
    .menu a:hover { background: var(--surface-hover); color: var(--text); padding-left: 20px; }
    .menu a.active { background: var(--surface-hover); color: var(--text); border-left: 4px solid var(--primary); border-radius: 0 8px 8px 0; }
    
    /* CONTEÚDO PRINCIPAL */
    .main-content { flex: 1; padding: 32px 40px; overflow-y: auto; animation: fadeIn 0.4s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; }
    .header h1 { font-size: 24px; font-weight: 600; }

    /* CARDS DE MÉTRICAS */
    .metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 32px; }
    .card { background: var(--surface); border: 1px solid var(--border); padding: 20px; border-radius: 12px; transition: transform 0.2s; }
    .card:hover { transform: translateY(-2px); }
    .card .title { font-size: 12px; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; font-weight: 600; }
    .card .value { font-size: 24px; font-weight: bold; }
    .card .value.success { color: var(--success); }
    .card .value.danger { color: var(--danger); }

    /* BARRA DE FERRAMENTAS E FILTROS */
    .toolbar { display: flex; gap: 16px; margin-bottom: 20px; }
    .search-box { flex: 1; position: relative; }
    .search-box i { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--muted); }
    .search-box input { width: 100%; background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 12px 16px 12px 44px; border-radius: 8px; outline: none; transition: border 0.3s; }
    .search-box input:focus { border-color: var(--primary); }
    
    .filter-select { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 0 16px; border-radius: 8px; outline: none; cursor: pointer; font-weight: 500; transition: border 0.3s; }
    .filter-select:focus { border-color: var(--primary); }

    /* TABELA HISTÓRICA */
    .table-wrapper { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
    table { width: 100%; border-collapse: collapse; text-align: left; }
    th { background: var(--surface-hover); padding: 16px; font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; }
    td { padding: 16px; border-bottom: 1px solid var(--border); font-size: 14px; vertical-align: middle; }
    tr { transition: background 0.2s; }
    tr:hover { background: var(--surface-hover); }

    .badge { padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: 600; display: inline-flex; align-items: center; gap: 6px; }
    .badge.entrada { background: rgba(16, 185, 129, 0.1); color: var(--success); border: 1px solid rgba(16, 185, 129, 0.2); }
    .badge.saida { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.2); }

    /* TOASTS (NOTIFICAÇÕES) */
    .toast-container { position: fixed; bottom: 24px; right: 24px; display: flex; flex-direction: column; gap: 12px; z-index: 9999; }
    .toast { display: flex; align-items: center; gap: 12px; padding: 16px 20px; border-radius: 8px; font-size: 14px; font-weight: 500; color: #fff; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); animation: slideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; min-width: 250px; }
    .toast.success { background: var(--surface); border-left: 4px solid var(--success); }
    .toast.success i { color: var(--success); font-size: 20px; }
    .toast.error { background: var(--surface); border-left: 4px solid var(--danger); }
    .toast.error i { color: var(--danger); font-size: 20px; }
    .toast.fade-out { animation: fadeOut 0.4s forwards; }

    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes fadeOut { from { transform: translateX(0); opacity: 1; } to { transform: translateX(100%); opacity: 0; } }
  </style>
</head>
<body>

  <aside class="sidebar">
    <div class="logo"><i class="ph-fill ph-package"></i> StockControl</div>
    <ul class="menu">
      <li><a href="dashboard.html"><i class="ph ph-squares-four"></i> Visão Geral</a></li>
      <li><a href="produtos.html"><i class="ph ph-cube"></i> Produtos</a></li>
      <li><a href="categorias.html"><i class="ph ph-folders"></i> Categorias</a></li>
      <li><a href="movimentacoes.html" class="active"><i class="ph ph-arrows-left-right"></i> Movimentações</a></li>
    </ul>
    <div style="margin-top: auto;">
      <a href="index.html" style="color: var(--danger); text-decoration: none; display: flex; align-items: center; gap: 12px; padding: 12px;"><i class="ph ph-sign-out"></i> Sair do sistema</a>
    </div>
  </aside>

  <main class="main-content">
    <div class="header">
      <h1>Movimentações do Estoque</h1>
    </div>

    <div class="metrics">
      <div class="card"><div class="title">Total de Operações</div><div class="value" id="total-ops">0</div></div>
      <div class="card"><div class="title">Entradas de Estoque</div><div class="value success" id="total-entradas">+ 0</div></div>
      <div class="card"><div class="title">Saídas de Estoque</div><div class="value danger" id="total-saidas">- 0</div></div>
    </div>

    <div class="toolbar">
      <div class="search-box">
        <i class="ph ph-magnifying-glass"></i>
        <input type="text" id="inputBuscaMov" placeholder="Digitar nome do produto para buscar..." onkeyup="filtrarMovimentacoes()"/>
      </div>
      <select id="filtroTipo" class="filter-select" onchange="filtrarMovimentacoes()">
        <option value="TODOS">Todos os tipos</option>
        <option value="ENTRADA">Apenas Entradas (+)</option>
        <option value="SAIDA">Apenas Saídas (-)</option>
      </select>
    </div>

    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>Data / Hora</th>
            <th>Produto</th>
            <th>Operação</th>
            <th>Quantidade</th>
            <th>Preço Unit. (no momento)</th>
            <th>Responsável</th>
          </tr>
        </thead>
        <tbody id="tabela-movimentacoes">
          </tbody>
      </table>
    </div>
  </main>

  <div class="toast-container" id="toastContainer"></div>

  <script>
    // URL base do seu Backend Spring Boot para Movimentações
    const API_URL_MOV = 'http://localhost:8080/movimentacoes';
    
    // Variável global para armazenar os dados do banco e permitir filtro instantâneo
    let dadosBanco = []; 

    // FUNÇÃO PARA CRIAR ALERTAS ELEGANTES NA TELA
    function mostrarNotificacao(mensagem, tipo = 'success') {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = `toast ${tipo}`;
      
      const icone = tipo === 'success' ? 'ph-check-circle' : 'ph-warning-circle';
      toast.innerHTML = `<i class="ph-fill ${icone}"></i> <span>${mensagem}</span>`;
      
      container.appendChild(toast);

      setTimeout(() => {
        toast.classList.add('fade-out');
        toast.addEventListener('animationend', () => toast.remove());
      }, 3500);
    }

    // BUSCA OS DADOS REAIS DO BACKEND JAVA
    async function carregarMovimentacoes() {
      const tbody = document.getElementById('tabela-movimentacoes');
      tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;"><i class="ph ph-spinner ph-spin"></i> Carregando histórico do banco de dados...</td></tr>';

      try {
        const response = await fetch(API_URL_MOV);
        if (!response.ok) throw new Error('Falha ao conectar no backend');
        
        dadosBanco = await response.json();
        renderizarTabela(dadosBanco);
        atualizarMetricas(dadosBanco);
      } catch (error) {
        tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; color: var(--danger);">Erro ao carregar movimentações. O servidor backend está rodando?</td></tr>';
        mostrarNotificacao('Erro de conexão ao buscar histórico', 'error');
      }
    }

    // RENDERIZA A TABELA
    function renderizarTabela(lista) {
      const tbody = document.getElementById('tabela-movimentacoes');
      tbody.innerHTML = '';

      if (lista.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding: 20px; color: var(--muted);">Nenhum histórico registrado no sistema.</td></tr>';
        return;
      }

      lista.forEach(m => {
        const tr = document.createElement('tr');
        
        // Tratamento defensivo caso os nomes dos atributos no Java sejam um pouco diferentes
        const tipoMov = (m.tipo || m.tipoMovimentacao || 'ENTRADA').toUpperCase();
        const nomeProd = m.produto ? (m.produto.nome || m.produto) : 'Produto Excluído/Desconhecido';
        const qtd = m.quantidade || m.qtd || 0;
        const preco = m.precoUnitario || m.preco || 0;
        const usuario = m.usuario || 'Sistema';
        
        // Formata a data (se vier padrão ISO do Java: 2026-07-04T15:32:00)
        let dataFormatada = m.data || m.dataHora || 'Data Indisponível';
        if (m.data || m.dataHora) {
          const dataObj = new Date(m.data || m.dataHora);
          if (!isNaN(dataObj)) {
            dataFormatada = dataObj.toLocaleDateString('pt-BR') + ' ' + dataObj.toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'});
          }
        }

        // Estilização baseada no tipo da movimentação
        const isEntrada = tipoMov === 'ENTRADA';
        const badgeClass = isEntrada ? 'badge entrada' : 'badge saida';
        const icon = isEntrada ? '<i class="ph-fill ph-arrow-circle-down"></i>' : '<i class="ph-fill ph-arrow-circle-up"></i>';
        const qtdColor = isEntrada ? 'var(--success)' : 'var(--danger)';
        const sinal = isEntrada ? '+' : '-';

        tr.innerHTML = `
          <td style="color: var(--muted); font-size: 13px;">${dataFormatada}</td>
          <td style="font-weight: 500;">${nomeProd}</td>
          <td><span class="${badgeClass}">${icon} ${tipoMov}</span></td>
          <td style="color: ${qtdColor}; font-weight: 700; font-size: 15px;">${sinal} ${qtd}</td>
          <td>R$ ${preco.toFixed(2)}</td>
          <td>${usuario}</td>
        `;
        tbody.appendChild(tr);
      });
    }

    // ATUALIZA OS CARDS SUPERIORES
    function atualizarMetricas(lista) {
      let entradas = 0;
      let saidas = 0;

      lista.forEach(m => {
        const tipoMov = (m.tipo || m.tipoMovimentacao || 'ENTRADA').toUpperCase();
        const qtd = m.quantidade || m.qtd || 0;

        if (tipoMov === 'ENTRADA') entradas += qtd;
        else saidas += qtd;
      });

      document.getElementById('total-ops').textContent = lista.length;
      document.getElementById('total-entradas').textContent = `+ ${entradas}`;
      document.getElementById('total-saidas').textContent = `- ${saidas}`;
    }

    // FILTRO DE BUSCA LOCAL (Aproveita os dados que já vieram do banco)
    function filtrarMovimentacoes() {
      const termo = document.getElementById('inputBuscaMov').value.toLowerCase();
      const tipoSelecionado = document.getElementById('filtroTipo').value;

      const filtrados = dadosBanco.filter(m => {
        const nomeProd = (m.produto ? (m.produto.nome || m.produto) : '').toLowerCase();
        const tipoMov = (m.tipo || m.tipoMovimentacao || 'ENTRADA').toUpperCase();

        const bateNome = nomeProd.includes(termo);
        const bateTipo = tipoSelecionado === 'TODOS' || tipoMov === tipoSelecionado;
        
        return bateNome && bateTipo;
      });

      renderizarTabela(filtrados);
    }

    // Dispara a busca real no banco ao carregar a página
    window.onload = carregarMovimentacoes;
  </script>
</body>
</html>
