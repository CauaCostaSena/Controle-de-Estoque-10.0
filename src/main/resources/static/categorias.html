<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <title>StockControl – Categorias</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <style>
    /* ... Cole aqui o mesmo bloco <style> que usei no produtos.html acima (até a .btn-cancel) ... */
    /* Resumo das variáveis e layout base para não estourar o limite de texto: */
    :root { --bg: #0f172a; --surface: #1e293b; --surface-hover: #334155; --border: #334155; --text: #f8fafc; --muted: #94a3b8; --primary: #6366f1; --primary-hover: #4f46e5; --danger: #ef4444; }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
    body { background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }
    
    .sidebar { width: 260px; min-width: 260px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 24px; height: 100vh; }
    .sidebar .logo { font-size: 20px; font-weight: bold; margin-bottom: 40px; display: flex; align-items: center; gap: 10px; }
    .sidebar .logo i { color: var(--primary); font-size: 28px; }
    .menu { list-style: none; display: flex; flex-direction: column; gap: 8px; flex: 1; }
    .menu a { text-decoration: none; color: var(--muted); padding: 12px 16px; border-radius: 8px; display: flex; align-items: center; gap: 12px; font-weight: 500; transition: all 0.2s ease; }
    .menu a:hover { background: var(--surface-hover); color: var(--text); padding-left: 20px; }
    .menu a.active { background: var(--surface-hover); color: var(--text); border-left: 4px solid var(--primary); border-radius: 0 8px 8px 0; }
    
    .main-content { flex: 1; padding: 32px 40px; overflow-y: auto; animation: fadeIn 0.4s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; }
    .header h1 { font-size: 24px; font-weight: 600; }
    .btn-primary { background: var(--primary); color: #fff; border: none; padding: 10px 20px; border-radius: 8px; font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: all 0.2s; }
    .btn-primary:hover { background: var(--primary-hover); transform: translateY(-2px); }
    .btn-primary:active { transform: scale(0.95); }

    .table-wrapper { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; max-width: 800px;}
    table { width: 100%; border-collapse: collapse; text-align: left; }
    th { background: var(--surface-hover); padding: 16px; font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; }
    td { padding: 16px; border-bottom: 1px solid var(--border); font-size: 14px; vertical-align: middle; }
    tr { transition: background 0.2s; }
    tr:hover { background: var(--surface-hover); }
    
    .actions { display: flex; gap: 8px; }
    .btn-icon { background: var(--surface-hover); border: 1px solid var(--border); color: var(--text); width: 32px; height: 32px; border-radius: 6px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s; }
    .btn-icon:hover { background: var(--primary); border-color: var(--primary); color: #fff; transform: translateY(-2px); }
    .btn-icon.delete:hover { background: var(--danger); border-color: var(--danger); }
  </style>
</head>
<body>

  <aside class="sidebar">
    <div class="logo"><i class="ph-fill ph-package"></i> StockControl</div>
    <ul class="menu">
      <li><a href="dashboard.html"><i class="ph ph-squares-four"></i> Visão Geral</a></li>
      <li><a href="produtos.html"><i class="ph ph-cube"></i> Produtos</a></li>
      <li><a href="categorias.html" class="active"><i class="ph ph-folders"></i> Categorias</a></li>
      <li><a href="movimentacoes.html"><i class="ph ph-arrows-left-right"></i> Movimentações</a></li>
    </ul>
  </aside>

  <main class="main-content">
    <div class="header">
      <h1>Categorias</h1>
      <button class="btn-primary"><i class="ph ph-plus"></i> Nova Categoria</button>
    </div>

    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th width="80%">Nome da Categoria</th>
            <th width="20%">Ações</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>Eletrônicos</td>
            <td>
              <div class="actions">
                <button class="btn-icon"><i class="ph ph-pencil-simple"></i></button>
                <button class="btn-icon delete"><i class="ph ph-trash"></i></button>
              </div>
            </td>
          </tr>
          <tr>
            <td>Padaria</td>
            <td>
              <div class="actions">
                <button class="btn-icon"><i class="ph ph-pencil-simple"></i></button>
                <button class="btn-icon delete"><i class="ph ph-trash"></i></button>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </main>

</body>
</html>
