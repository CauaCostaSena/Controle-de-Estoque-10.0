<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>StockControl – Visão Geral</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <style>
    :root {
      --bg: #0f172a; 
      --surface: #1e293b; 
      --surface-hover: #334155;
      --border: #334155; 
      --text: #f8fafc; 
      --muted: #94a3b8;
      --primary: #6366f1; 
      --primary-hover: #4f46e5; 
      --danger: #ef4444; 
      --success: #10b981; 
      --warning: #f59e0b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
    body { background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }
    
    /* SIDEBAR NAVIGATION */
    .sidebar { width: 260px; min-width: 260px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; justify-content: space-between; padding: 24px; }
    .brand { display: flex; align-items: center; gap: 12px; font-size: 20px; font-weight: 700; color: #fff; margin-bottom: 32px; }
    .brand i { color: var(--primary); font-size: 28px; }
    .menu { list-style: none; display: flex; flex-direction: column; gap: 8px; flex-grow: 1; }
    .menu a { display: flex; align-items: center; gap: 12px; padding: 12px; color: var(--muted); text-decoration: none; border-radius: 8px; font-weight: 500; transition: all 0.2s; }
    .menu a:hover, .menu a.active { background: var(--surface-hover); color: #fff; }
    .menu a.active { border-left: 4px solid var(--primary); border-radius: 0 8px 8px 0; padding-left: 8px; }
    .user-info { display: flex; align-items: center; justify-content: space-between; padding-top: 16px; border-top: 1px solid var(--border); color: var(--muted); font-size: 14px; }
    .btn-logout { background: none; border: none; color: var(--danger); cursor: pointer; font-size: 18px; }
    
    /* MAIN CONTENT */
    .main-content { flex-grow: 1; padding: 40px; overflow-y: auto; display: flex; flex-direction: column; gap: 32px; }
    .header h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }
    .header p { color: var(--muted); font-size: 14px; margin-top: 4px; }
    
    /* METRICS CARDS */
    .metrics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; }
    .card { background: var(--surface); border: 1px solid var(--border); padding: 24px; border-radius: 12px; display: flex; flex-direction: column; gap: 12px; }
    .card-header { display: flex; align-items: center; justify-content: space-between; color: var(--muted); font-size: 14px; font-weight: 500; }
    .card-header i { font-size: 24px; }
    .card-value { font-size: 32px; font-weight: 700; color: #fff; }
    
    /* PANELS SPLIT */
    .panels-split { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
    @media (max-width: 1024px) { .panels-split { grid-template-columns: 1fr; } }
    .panel { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; display: flex; flex-direction: column; gap: 16px; }
    .panel h3 { font-size: 18px; font-weight: 600; color: #fff; display: flex; align-items: center; gap: 8px; }
    
    /* ITEM LISTS */
    .list-container { display: flex; flex-direction: column; gap: 12px; }
    .list-item { background: rgba(15, 23, 42, 0.4); border: 1px solid var(--border); padding: 14px 16px; border-radius: 8px; display: flex; align-items: center; justify-content: space-between; }
    .item-info { display: flex; flex-direction: column; gap: 4px; }
    .item-name { font-weight: 600; font-size: 14px; color: #fff; }
    .item-sub { font-size: 12px; color: var(--muted); }
    
    /* BADGES */
    .badge { padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: 600; }
    .badge.danger { background: rgba(239, 68, 68, 0.15); color: #fca5a5; border: 1px solid var(--danger); }
    .badge.success { background: rgba(16, 185, 129, 0.15); color: #a7f3d0; border: 1px solid var(--success); }
    .badge.warning { background: rgba(245, 158, 11, 0.15); color: #fde68a; border: 1px solid var(--warning); }
    
    .error-msg { color: var(--danger); font-size: 14px; padding: 12px; text-align: center; }
  </style>
</head>
<body>

  <aside class="sidebar">
    <div>
      <div class="brand">
        <i class="ph ph-package"></i>
        <span>StockControl</span>
      </div>
      <ul class="menu">
        <li><a href="dashboard.html" class="active"><i class="ph ph-squares-four"></i> Visão Geral</a></li>
        <li><a href="produtos.html"><i class="ph ph-cube"></i> Produtos</a></li>
        <li><a href="categorias.html"><i class="ph ph-folders"></i> Categorias</a></li>
        <li><a href="movimentacoes.html"><i class="ph ph-arrows-left-right"></i> Movimentações</a></li>
      </ul>
    </div>
    <div class="user-info">
      <div>
        <i class="ph ph-user-circle"></i> <span id="sessao-usuario">Operador</span>
      </div>
      <button class="btn-logout" onclick="logout()" title="Sair"><i class="ph ph-sign-out"></i></button>
    </div>
  </aside>

  <main class="main-content">
    <div class="header">
      <h1>Visão Geral do Estoque</h1>
      <p id="data-atual">Painel integrado às regras corporativas de integridade</p>
    </div>

    <!-- Indicadores -->
    <div class="metrics-grid">
      <div class="card">
        <div class="card-header">Total de Itens <i class="ph ph-calculator" style="color:var(--primary)"></i></div>
        <div class="card-value" id="total-itens">0</div>
      </div>
      <div class="card">
        <div class="card-header">Alertas Críticos <i class="ph ph-warning" style="color:var(--danger)"></i></div>
        <div class="card-value" id="alertas-criticos" style="color:var(--danger)">0</div>
      </div>
      <div class="card">
        <div class="card-header">Movimentações <i class="ph ph-activity" style="color:var(--success)"></i></div>
        <div class="card-value" id="total-movs">0</div>
      </div>
    </div>

    <!-- Painéis -->
    <div class="panels-split">
      <div class="panel">
        <h3><i class="ph ph-bell-ringing" style="color:var(--warning)"></i> Produtos com Estoque Baixo</h3>
        <div class="list-container" id="lista-alertas">
          <!-- Dinâmico -->
        </div>
      </div>

      <div class="panel">
        <h3><i class="ph ph-clock-counter-clockwise" style="color:var(--primary)"></i> Atividades Recentes</h3>
        <div class="list-container" id="lista-movimentacoes">
          <!-- Dinâmico -->
        </div>
      </div>
    </div>
  </main>

  <script>
    // Validação de Sessão Segura
    const operId = sessionStorage.getItem('usuarioId');
    const operLogin = sessionStorage.getItem('usuarioLogin');
    if (!operId) { window.location.href = 'index.html'; }
    document.getElementById('sessao-usuario').textContent = `@${operLogin}`;

    document.getElementById('data-atual').textContent = `Conectado como @${operLogin} | Auditoria ativa.`;

    async function carregarDashboard() {
      try {
        // Busca produtos e movimentações das APIs reais do Spring
        const [resProd, resMov] = await Promise.all([
          fetch('/produtos').then(r => r.ok ? r.json() : []),
          fetch('/movimentacoes').then(r => r.ok ? r.json() : [])
        ]);

        // 1. Processar Métricas de Produtos
        let totalQtd = 0;
        let baixosCount = 0;
        const listaAlertas = document.getElementById('lista-alertas');
        listaAlertas.innerHTML = '';

        resProd.forEach(p => {
          totalQtd += p.quantidade;
          if (p.quantidade <= 5) {
            baixosCount++;
            listaAlertas.innerHTML += `
              <div class="list-item">
                <div class="item-info">
                  <span class="item-name">${p.nome}</span>
                  <span class="item-sub">Preço Un.: R$ ${p.preco.toFixed(2)}</span>
                </div>
                <span class="badge danger">${p.quantidade} un no estoque</span>
              </div>
            `;
          }
        });

        if (baixosCount === 0) {
          listaAlertas.innerHTML = '<div style="color:var(--muted); text-align:center; padding:12px; font-size:14px;">Nenhum produto com estoque crítico!</div>';
        }

        document.getElementById('total-itens').textContent = resProd.length;
        document.getElementById('alertas-criticos').textContent = baixosCount;
        document.getElementById('total-movs').textContent = resMov.length;

        // 2. Processar Atividades Recentes (Últimas 5 movimentações)
        const listaMov = document.getElementById('lista-movimentacoes');
        listaMov.innerHTML = '';

        const ultimasMovs = resMov.slice(-5).reverse();

        if (ultimasMovs.length === 0) {
          listaMov.innerHTML = '<div style="color:var(--muted); text-align:center; padding:12px; font-size:14px;">Nenhuma movimentação realizada ainda.</div>';
        }

        ultimasMovs.forEach(m => {
          const isEntrada = (m.tipo || '').toUpperCase() === 'ENTRADA';
          const badgeClass = isEntrada ? 'badge success' : 'badge warning';
          const sinal = isEntrada ? '+' : '-';
          const qtd = m.quantidade;
          
          // BLINDAGEM DA REGRA SET NULL DO BANCO DE DADOS:
          // Se o produto foi excluído, o id_produto fica nulo no banco. O JSON vira m.produto = null.
          const nomeProd = m.produto ? (m.produto.nome || m.produto) : '⚠️ Produto Excluído (Histórico Salvo)';
          const responsavel = m.usuario ? (m.usuario.login || m.usuario) : (m.usuario_login || 'Sistema');

          let dataStr = 'Recente';
          if (m.dataHora || m.data) {
            const d = new Date(m.dataHora || m.data);
            if (!isNaN(d)) dataStr = d.toLocaleDateString('pt-BR') + ' ' + d.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});
          }

          listaMov.innerHTML += `
            <div class="list-item">
              <div class="item-info">
                <span class="item-name">${nomeProd}</span>
                <span class="item-sub">${dataStr} por @${responsavel}</span>
              </div>
              <span class="${badgeClass}">${sinal} ${qtd} un</span>
            </div>
          `;
        });

      } catch (error) {
        document.getElementById('lista-alertas').innerHTML = '<div class="error-msg"><i class="ph ph-warning"></i> Falha ao atualizar dados operacionais.</div>';
        document.getElementById('lista-movimentacoes').innerHTML = '<div class="error-msg"><i class="ph ph-warning"></i> Falha ao carregar log de auditoria.</div>';
      }
    }

    function logout() {
      sessionStorage.clear();
      window.location.href = 'index.html';
    }

    window.onload = carregarDashboard;
  </script>
</body>
</html>
